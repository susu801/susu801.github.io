# Welcome to Jekyll!
# AcademicPages Config for Weitao Chen (susu801)

# Basic Site Settings
locale                   : "zh-CN"
site_theme               : "sunrise" # 备选: "default", "air", "mint", "dirt", "contrast"
title                    : "Weitao Chen (陈伟涛) - Nanjing University"
title_separator          : "-"
name                     : &name "Weitao Chen"
description              : &description "Weitao Chen's academic portfolio at Nanjing University"
url                      : "https://susu801.github.io" 
baseurl                  : "" 
repository               : "susu801/susu801.github.io"

# Site Author
author:
  # Biographic information
  avatar           : "profile.png" # 请确保仓库根目录下有名为 profile.png 的图片
  name             : "Weitao Chen"
  pronouns         : "he/him"
  bio              : "Graduate Student at Nanjing University. Research interests: Video Language Models (VLM), Video Analysis, and Machine Learning."
  location         : "Suzhou, China"
  employer         : "Nanjing University (NJU)"
  uri              : 
  email            : "522025710006@smail.nju.edu.cn" 

  # Academic websites
  academia         : 
  arxiv            : 
  googlescholar    : 
  orcid            : 
  semantic         : 
  researchgate     : 

  # Repositories and software development
  github           : "susu801"
  kaggle           : 
  stackoverflow    : 

  # Social media
  linkedin         : 
  twitter          : 
  weibo            : 
  zhihu            : 

# Publication Category
publication_category:
  books:
    title: 'Books'
  manuscripts:
    title: 'Journal Articles'    
  conferences:
    title: 'Conference Papers'

# Site Settings
teaser                   : 
breadcrumbs              : false 
words_per_minute         : 160
future                   : true
read_more                : "disabled" 
talkmap_link             : false      
comments:
  provider               : false

# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Capfile
  - config
  - Dockerfile
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - node_modules
  - package.json*
  - Rakefile
  - README
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Collections
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed 

# Outputting
permalink: /:categories/:title/
timezone: Etc/UTC 

# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji
